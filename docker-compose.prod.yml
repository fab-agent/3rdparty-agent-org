version: '3.8'

# Production: nginx reverse proxy + rate limiting
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
services:
  backend:
    ports: []           # Remove direct port exposure
    expose:
      - "8000"

  frontend:
    ports: []
    expose:
      - "5173"

  nginx:
    image: nginx:alpine
    container_name: 3rdparty-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
