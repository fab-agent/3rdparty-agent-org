version: '3.8'

# Production stack — run via install.sh or:
#   docker compose -f docker-compose.prod.yml up -d
#
# Requires: .env (generated by setup-env.sh), nginx.conf (generated by install.sh from nginx.prod.conf.template)

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: 3rdparty-backend
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    expose:
      - "8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: /api
    container_name: 3rdparty-frontend
    expose:
      - "3000"
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: 3rdparty-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    restart: unless-stopped
