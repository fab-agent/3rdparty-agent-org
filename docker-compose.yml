version: '3.8'

# Development: both services with hot-reload, no nginx
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: 3rdparty-backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./backend/logs:/app/logs
      - ./backend:/app
    environment:
      - DATABASE_URL=sqlite:///./data/app.db
      - ENVIRONMENT=development
    env_file:
      - path: ./backend/.env
        required: false
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/auth/setup-status || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: 3rdparty-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  data:
